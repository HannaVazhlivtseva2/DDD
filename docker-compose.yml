services:
  php:
    build:
      context: ./docker/php
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php

  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: app
      MARIADB_USER: app
      MARIADB_PASSWORD: app
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8026:8025"

  messenger-worker:
    build:
      context: ./docker/php
    volumes:
      - ./:/var/www/html
    command: php bin/console messenger:consume async -vv --time-limit=3600
    restart: unless-stopped
    depends_on:
      - db
      - mailpit

volumes:
  db_data:
