# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

    # Auth bounded context: bind Domain/Application ports to their Infrastructure adapters
    App\Auth\Domain\Repository\UserRepository:
        alias: App\Auth\Infrastructure\Persistence\Doctrine\DoctrineUserRepository

    App\Auth\Domain\Repository\PasswordResetTokenRepository:
        alias: App\Auth\Infrastructure\Persistence\Doctrine\DoctrinePasswordResetTokenRepository

    App\Auth\Domain\Service\PasswordHasher:
        alias: App\Auth\Infrastructure\Security\PasswordHasherAdapter

    App\Auth\Domain\Service\TokenGenerator:
        alias: App\Auth\Infrastructure\Security\TokenGeneratorAdapter

    Aws\S3\S3Client:
        factory: ['App\Auth\Infrastructure\Storage\S3ClientFactory', 'create']
        arguments:
            $region: '%env(AWS_S3_REGION)%'
            $accessKey: '%env(AWS_ACCESS_KEY_ID)%'
            $secretKey: '%env(AWS_SECRET_ACCESS_KEY)%'
            $endpoint: '%env(AWS_S3_ENDPOINT)%'

    App\Auth\Domain\Service\AvatarStorage:
        factory: ['App\Auth\Infrastructure\Storage\AvatarStorageFactory', 'create']
        arguments:
            $driver: '%env(AVATAR_STORAGE_DRIVER)%'

    App\Auth\Application\Command\CommandBus:
        alias: App\Auth\Infrastructure\Messenger\CommandBusAdapter

    App\Auth\Application\Query\QueryBus:
        alias: App\Auth\Infrastructure\Messenger\QueryBusAdapter

    App\Auth\Application\Port\EventPublisher:
        alias: App\Auth\Infrastructure\Messenger\EventPublisherAdapter

    App\Auth\Application\Command\RegisterUser\RegisterUserHandler:
        tags: [{ name: messenger.message_handler, bus: command.bus }]

    App\Auth\Application\Command\RequestPasswordReset\RequestPasswordResetHandler:
        tags: [{ name: messenger.message_handler, bus: command.bus }]

    App\Auth\Application\Command\ResetPassword\ResetPasswordHandler:
        tags: [{ name: messenger.message_handler, bus: command.bus }]

    App\Auth\Application\Command\UpdateProfile\UpdateProfileHandler:
        tags: [{ name: messenger.message_handler, bus: command.bus }]

    App\Auth\Application\Command\UpdateAvatar\UpdateAvatarHandler:
        tags: [{ name: messenger.message_handler, bus: command.bus }]

    App\Auth\Application\Query\GetUserByValidResetToken\GetUserByValidResetTokenHandler:
        tags: [{ name: messenger.message_handler, bus: query.bus }]
